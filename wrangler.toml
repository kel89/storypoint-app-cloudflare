name = "storypointer"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "./front-end/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[durable_objects]
bindings = [
  { name = "VOTING_ROOM", class_name = "VotingRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VotingRoom"]
